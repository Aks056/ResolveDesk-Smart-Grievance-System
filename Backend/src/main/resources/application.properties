# ============================================================
# SERVER CONFIGURATION
# ============================================================
spring.application.name=Smart Grievance Redressal System
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/
server.servlet.session.timeout=30m
server.compression.enabled=true
server.compression.min-response-size=1024

# ============================================================
# DATABASE CONFIGURATION
# ============================================================
# MySQL Connection
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_grievance_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=er21Fh@.0pulp
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.implicit_naming_strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true

# ============================================================
# JWT CONFIGURATION
# ============================================================
# Generate a strong secret key and set via environment variable in production
jwt.secret.key=${JWT_SECRET_KEY:mySecretKeyForJWTTokenGenerationAndValidationPurposeOnly1234567890}
jwt.expiration.time=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration.time=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================================
# EMAIL CONFIGURATION
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM:admin@grievance-system.com}
app.mail.fromName=Smart Grievance System

# ============================================================
# FILE UPLOAD CONFIGURATION
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
app.upload.dir=${UPLOAD_DIR:uploads/}
app.allowed.file.extensions=pdf,doc,docx,jpg,jpeg,png,txt

# ============================================================
# FRONTEND CONFIGURATION (DECOUPLED)
# ============================================================
# Thymeleaf is no longer used for the frontend.
spring.thymeleaf.enabled=false

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging.level.root=INFO
logging.level.com.ayush.grievance=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${LOG_FILE:logs/application.log}
logging.file.max-size=10MB
logging.file.max-history=10

# ============================================================
# ACTUATOR CONFIGURATION
# ============================================================
management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health,info}
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# ============================================================
# JACKSON CONFIGURATION
# ============================================================
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# ============================================================
# API DOCUMENTATION (SPRINGDOC-OPENAPI)
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.operations-sorter=method
